name: Deploy Lambda Functions

on:
  push:
    branches:
      - main  # mainブランチへのpush時に自動デプロイ

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # AWS認証情報を設定（GitHubシークレットから取得）
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      # Transcribe開始LambdaをZIP化してデプロイ
      - name: Deploy transcribe-starter
        run: |
          zip transcribe_starter.zip lambda/transcribe_start/app.py
          aws lambda update-function-code \
            --function-name call-summary-dev-transcribe-starter \
            --zip-file fileb://transcribe_starter.zip

      # 要約処理LambdaをZIP化してデプロイ
      - name: Deploy summarizer
        run: |
          zip summarizer.zip lambda/summary_processor/app.py
          aws lambda update-function-code \
            --function-name call-summary-dev-summarizer \
            --zip-file fileb://summarizer.zip

      # API取得LambdaをZIP化してデプロイ
      - name: Deploy api-handler
        run: |
          zip api_handler.zip lambda/get_summary_api/app.py
          aws lambda update-function-code \
            --function-name call-summary-dev-api-handler \
            --zip-file fileb://api_handler.zip
